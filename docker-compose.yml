services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: macrolens
      POSTGRES_USER: macrolens
      POSTGRES_PASSWORD: macrolens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macrolens -d macrolens"]
      interval: 3s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://macrolens:macrolens@postgres:5432/macrolens?sslmode=disable
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
